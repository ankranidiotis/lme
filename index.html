<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LME Lead Price</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --card-bg: #fff;
      --text: #222;
      --text-muted: #666;
      --text-faint: #999;
      --grid: #f0f0f0;
      --shadow: rgba(0,0,0,0.08);
      --btn-bg: #e2e8f0;
      --btn-text: #334155;
      --btn-hover: #cbd5e1;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      --grid: #334155;
      --shadow: rgba(0,0,0,0.4);
      --btn-bg: #334155;
      --btn-text: #e2e8f0;
      --btn-hover: #475569;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      transition: background 0.2s, color 0.2s;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 900px;
      margin-bottom: 0.25rem;
    }
    h1 { font-size: 1.5rem; flex: 1; }

    .toggle-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .toggle-btn:hover { background: var(--btn-hover); }

    .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; width: 100%; max-width: 900px; }

    .chart-wrapper {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 2px 8px var(--shadow);
      padding: 1.5rem;
      width: 100%;
      max-width: 900px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    canvas { width: 100% !important; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .stat-card {
      background: var(--bg);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      transition: background 0.2s;
    }
    .stat-card .month { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.2rem; }
    .stat-card .value { font-size: 1rem; font-weight: 600; color: var(--text); }

    .meta {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-faint);
      text-align: right;
    }
    .error {
      color: #ef4444;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--text-faint);
      text-align: center;
      width: 100%;
      max-width: 900px;
    }
    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>LME Lead Price</h1>
    <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()">Dark mode</button>
  </div>
  <p class="subtitle">EUR / tonne</p>
  <div class="chart-wrapper">
    <canvas id="chart"></canvas>
    <div class="stats-grid" id="statsGrid"></div>
    <p class="meta" id="meta"></p>
    <p class="error" id="error"></p>
  </div>

  <footer>
    Data sourced from <a href="https://www.lme.com" target="_blank" rel="noopener">lme.com</a> &mdash;
    <a href="https://nassoskranidiotis.com" target="_blank" rel="noopener">nassoskranidiotis.com</a>
  </footer>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('themeToggle').textContent = isDark ? 'Dark mode' : 'Light mode';
      if (window._chart) updateChartTheme(window._chart);
    }

    function getCssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function updateChartTheme(chart) {
      const grid = getCssVar('--grid');
      const text = getCssVar('--text-muted');
      chart.options.scales.x.grid.color = grid;
      chart.options.scales.x.ticks.color = text;
      chart.options.scales.y.grid.color = grid;
      chart.options.scales.y.ticks.color = text;
      chart.options.scales.y.title.color = text;
      chart.update();
    }

    function monthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    function monthLabel(key) {
      const [y, m] = key.split('-');
      return new Date(+y, +m - 1, 1).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
    }

    async function init() {
      let payload;
      try {
        const res = await fetch('./data.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        payload = await res.json();
      } catch (err) {
        document.getElementById('error').textContent = `Failed to load data: ${err.message}`;
        return;
      }

      const { updated, data } = payload;

      if (!data || data.length === 0) {
        document.getElementById('error').textContent = 'No data available yet.';
        return;
      }

      const labels = data.map(d => new Date(d.timestamp));
      const values = data.map(d => d.lmelead);

      // Monthly averages
      const monthBuckets = {};
      data.forEach(d => {
        const key = monthKey(new Date(d.timestamp));
        if (!monthBuckets[key]) monthBuckets[key] = [];
        monthBuckets[key].push(d.lmelead);
      });
      const monthKeys = Object.keys(monthBuckets).sort();
      const monthAvgs = monthKeys.map(k => ({
        key: k,
        avg: monthBuckets[k].reduce((a, b) => a + b, 0) / monthBuckets[k].length
      }));

      // Build monthly avg dataset aligned to mid-month for display
      const avgLabels = monthAvgs.map(m => {
        const [y, mo] = m.key.split('-');
        return new Date(+y, +mo - 1, 15);
      });
      const avgValues = monthAvgs.map(m => m.avg);

      const grid = getCssVar('--grid');
      const textMuted = getCssVar('--text-muted');

      window._chart = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
          datasets: [
            {
              label: 'Daily price',
              data: labels.map((l, i) => ({ x: l, y: values[i] })),
              borderColor: '#2563eb',
              backgroundColor: 'rgba(37,99,235,0.07)',
              borderWidth: 1.5,
              pointRadius: data.length > 90 ? 0 : 3,
              pointHoverRadius: 5,
              fill: true,
              tension: 0.3,
              order: 2,
            },
            {
              label: 'Monthly avg',
              data: avgLabels.map((l, i) => ({ x: l, y: avgValues[i] })),
              borderColor: '#f59e0b',
              backgroundColor: 'transparent',
              borderWidth: 2,
              borderDash: [6, 3],
              pointRadius: 4,
              pointHoverRadius: 6,
              fill: false,
              tension: 0,
              order: 1,
            }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'month', tooltipFormat: 'dd MMM yyyy' },
              grid: { color: grid },
              ticks: { color: textMuted },
            },
            y: {
              title: { display: true, text: 'EUR / tonne', color: textMuted },
              grid: { color: grid },
              ticks: { color: textMuted },
            }
          },
          plugins: {
            legend: { display: true, labels: { color: textMuted } },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: €${ctx.parsed.y.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
              }
            }
          }
        }
      });

      // Render monthly avg stat cards
      const grid2 = document.getElementById('statsGrid');
      monthAvgs.forEach(m => {
        const card = document.createElement('div');
        card.className = 'stat-card';
        card.innerHTML = `<div class="month">${monthLabel(m.key)}</div><div class="value">€${m.avg.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>`;
        grid2.appendChild(card);
      });

      if (updated) {
        const d = new Date(updated);
        document.getElementById('meta').textContent =
          `Last updated: ${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}`;
      }
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LME Lead Price</title>
  <link rel="icon" type="image/x-icon" href="fav.ico" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --card-bg: #fff;
      --text: #222;
      --text-muted: #666;
      --text-faint: #999;
      --grid: #f0f0f0;
      --shadow: rgba(0,0,0,0.08);
      --btn-bg: #e2e8f0;
      --btn-text: #334155;
      --btn-hover: #cbd5e1;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      --grid: #334155;
      --shadow: rgba(0,0,0,0.4);
      --btn-bg: #334155;
      --btn-text: #e2e8f0;
      --btn-hover: #475569;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      transition: background 0.2s, color 0.2s;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 900px;
      margin-bottom: 0.25rem;
    }
    h1 { font-size: 1.5rem; flex: 1; }

    .toggle-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .toggle-btn:hover { background: var(--btn-hover); }

    .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; width: 100%; max-width: 900px; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      width: 100%;
      max-width: 900px;
      margin-bottom: 1rem;
    }
    .range-btns, .action-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .range-btn.active { background: #2563eb; color: #fff; }
    .range-btn.active:hover { background: #1d4ed8; }

    .chart-wrapper {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 2px 8px var(--shadow);
      padding: 1.5rem;
      width: 100%;
      max-width: 900px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    canvas { width: 100% !important; }

    .zoom-hint {
      font-size: 0.75rem;
      color: var(--text-faint);
      text-align: right;
      margin-top: 0.4rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .stat-card {
      background: var(--bg);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      transition: background 0.2s;
    }
    .stat-card .month { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.2rem; }
    .stat-card .card-row { display: flex; justify-content: space-between; align-items: center; }
    .stat-card .value { font-size: 1rem; font-weight: 600; color: var(--text); }
    .stat-card .change { font-size: 0.78rem; font-weight: 600; }
    .stat-card .up { color: #22c55e; }
    .stat-card .down { color: #ef4444; }
    .stat-card .neutral { color: var(--text-faint); }
    .stat-card .range-row { display: flex; gap: 0.5rem; font-size: 0.72rem; color: var(--text-faint); margin-top: 0.25rem; }

    .meta {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-faint);
      text-align: right;
    }
    .error {
      color: #ef4444;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .table-section {
      width: 100%;
      max-width: 900px;
      margin-top: 1rem;
    }
    .table-wrapper {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 2px 8px var(--shadow);
      overflow: auto;
      max-height: 360px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th {
      position: sticky;
      top: 0;
      background: var(--card-bg);
      padding: 0.6rem 1rem;
      text-align: left;
      color: var(--text-muted);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--grid);
      transition: background 0.2s;
    }
    thead th:hover { color: var(--text); }
    tbody tr { border-bottom: 1px solid var(--grid); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 0.45rem 1rem; color: var(--text); }
    tbody tr:hover { background: var(--btn-bg); }
    .sort-icon { font-size: 0.7rem; color: var(--text-faint); margin-left: 0.2rem; }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--text-faint);
      text-align: center;
      width: 100%;
      max-width: 900px;
    }
    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>LME Lead Price</h1>
    <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()">Light mode</button>
  </div>
  <p class="subtitle">EUR / tonne &mdash; Cash contract, offer price</p>

  <div class="toolbar" id="toolbar">
    <div class="range-btns">
      <button class="toggle-btn range-btn" data-range="1M">1M</button>
      <button class="toggle-btn range-btn" data-range="3M">3M</button>
      <button class="toggle-btn range-btn" data-range="6M">6M</button>
      <button class="toggle-btn range-btn" data-range="YTD">YTD</button>
      <button class="toggle-btn range-btn active" data-range="All">All</button>
    </div>
    <div class="action-btns">
      <button class="toggle-btn" id="toggleTableBtn" onclick="toggleTable()">Show table</button>
      <button class="toggle-btn" onclick="exportCSV()">Export CSV</button>
      <button class="toggle-btn" onclick="exportPNG()">Save PNG</button>
    </div>
  </div>

  <div class="chart-wrapper">
    <canvas id="chart"></canvas>
    <p class="zoom-hint">Scroll to zoom &middot; drag to pan &middot; double-click to reset</p>
    <div class="stats-grid" id="statsGrid"></div>
    <p class="meta" id="meta"></p>
    <p class="error" id="error"></p>
  </div>

  <div class="table-section" id="tableSection" style="display:none;">
    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th data-col="date">Date <span class="sort-icon">⇅</span></th>
            <th data-col="price">Price (EUR/t) <span class="sort-icon">⇅</span></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    Data sourced from <a href="https://www.lme.com" target="_blank" rel="noopener">lme.com</a> &mdash;
    Designed by <a href="https://nassoskranidiotis.com" target="_blank" rel="noopener">nassoskranidiotis.com</a>
  </footer>

  <script>
    let allData = [];
    let filteredData = [];
    let activeRange = 'All';
    let tableVisible = false;
    let tableSortCol = 'date';
    let tableSortAsc = false;

    function fmt(n) {
      return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('themeToggle').textContent = isDark ? 'Light mode' : 'Dark mode';
      if (window._chart) updateChartTheme(window._chart);
    }

    function getCssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function updateChartTheme(chart) {
      const grid = getCssVar('--grid');
      const text = getCssVar('--text-muted');
      chart.options.scales.x.grid.color = grid;
      chart.options.scales.x.ticks.color = text;
      chart.options.scales.y.grid.color = grid;
      chart.options.scales.y.ticks.color = text;
      chart.options.scales.y.title.color = text;
      chart.options.plugins.legend.labels.color = text;
      chart.update();
    }

    function monthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    function monthLabel(key) {
      const [y, m] = key.split('-');
      return new Date(+y, +m - 1, 1).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
    }

    function applyRange(range) {
      activeRange = range;
      const last = new Date(allData[allData.length - 1].timestamp);
      let cutoff = null;
      if (range === '1M') {
        cutoff = new Date(last); cutoff.setMonth(cutoff.getMonth() - 1);
      } else if (range === '3M') {
        cutoff = new Date(last); cutoff.setMonth(cutoff.getMonth() - 3);
      } else if (range === '6M') {
        cutoff = new Date(last); cutoff.setMonth(cutoff.getMonth() - 6);
      } else if (range === 'YTD') {
        cutoff = new Date(last.getFullYear(), 0, 1);
      }
      filteredData = cutoff
        ? allData.filter(d => new Date(d.timestamp) >= cutoff)
        : [...allData];

      document.querySelectorAll('.range-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.range === range);
      });

      render();
    }

    function buildMonthAvgs() {
      const buckets = {};
      filteredData.forEach(d => {
        const key = monthKey(new Date(d.timestamp));
        if (!buckets[key]) buckets[key] = [];
        buckets[key].push(d.lmelead);
      });
      return Object.keys(buckets).sort().map(k => ({
        key: k,
        avg: buckets[k].reduce((a, b) => a + b, 0) / buckets[k].length,
        min: Math.min(...buckets[k]),
        max: Math.max(...buckets[k]),
      }));
    }

    function render() {
      const labels = filteredData.map(d => new Date(d.timestamp));
      const values = filteredData.map(d => d.lmelead);
      const monthAvgs = buildMonthAvgs();
      const avgPoints = monthAvgs.map(m => {
        const [y, mo] = m.key.split('-');
        return { x: new Date(+y, +mo - 1, 15), y: m.avg };
      });

      if (!window._chart) {
        const grid = getCssVar('--grid');
        const textMuted = getCssVar('--text-muted');

        window._chart = new Chart(document.getElementById('chart'), {
          type: 'line',
          data: {
            datasets: [
              {
                label: 'Daily price',
                data: labels.map((l, i) => ({ x: l, y: values[i] })),
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37,99,235,0.07)',
                borderWidth: 1.5,
                pointRadius: filteredData.length > 90 ? 0 : 3,
                pointHoverRadius: 5,
                fill: true,
                tension: 0.3,
                order: 2,
              },
              {
                label: 'Monthly avg',
                data: avgPoints,
                borderColor: '#f59e0b',
                backgroundColor: 'transparent',
                borderWidth: 2,
                borderDash: [6, 3],
                pointRadius: 4,
                pointHoverRadius: 6,
                fill: false,
                tension: 0,
                order: 1,
              }
            ]
          },
          options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            scales: {
              x: {
                type: 'time',
                time: { unit: 'month', tooltipFormat: 'dd MMM yyyy' },
                grid: { color: grid },
                ticks: { color: textMuted },
              },
              y: {
                title: { display: true, text: 'EUR / tonne', color: textMuted },
                grid: { color: grid },
                ticks: { color: textMuted },
              }
            },
            plugins: {
              legend: { display: true, labels: { color: textMuted } },
              tooltip: {
                callbacks: {
                  label: ctx => `${ctx.dataset.label}: €${fmt(ctx.parsed.y)}`
                }
              },
              zoom: {
                zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
                pan: { enabled: true, mode: 'x' },
              }
            }
          }
        });

        document.getElementById('chart').addEventListener('dblclick', () => {
          window._chart.resetZoom();
        });
      } else {
        window._chart.resetZoom();
        window._chart.data.datasets[0].data = labels.map((l, i) => ({ x: l, y: values[i] }));
        window._chart.data.datasets[0].pointRadius = filteredData.length > 90 ? 0 : 3;
        window._chart.data.datasets[1].data = avgPoints;
        window._chart.update();
      }

      renderStatCards(monthAvgs);
      if (tableVisible) renderTable();
    }

    function renderStatCards(monthAvgs) {
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = '';
      monthAvgs.forEach((m, i) => {
        const prev = i > 0 ? monthAvgs[i - 1].avg : null;
        const pct = prev !== null ? ((m.avg - prev) / prev) * 100 : null;
        const dir = pct === null ? 'neutral' : pct > 0 ? 'up' : pct < 0 ? 'down' : 'neutral';
        const arrow = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '—';
        const pctStr = pct !== null ? `${arrow} ${Math.abs(pct).toFixed(1)}%` : arrow;

        const card = document.createElement('div');
        card.className = 'stat-card';
        card.innerHTML = `
          <div class="month">${monthLabel(m.key)}</div>
          <div class="card-row">
            <div class="value">€${fmt(m.avg)}</div>
            <div class="change ${dir}">${pctStr}</div>
          </div>
          <div class="range-row">
            <span>↓ €${fmt(m.min)}</span>
            <span>↑ €${fmt(m.max)}</span>
          </div>`;
        grid.appendChild(card);
      });
    }

    function toggleTable() {
      tableVisible = !tableVisible;
      const sec = document.getElementById('tableSection');
      const btn = document.getElementById('toggleTableBtn');
      sec.style.display = tableVisible ? 'block' : 'none';
      btn.textContent = tableVisible ? 'Hide table' : 'Show table';
      if (tableVisible) renderTable();
    }

    function renderTable() {
      const rows = [...filteredData].sort((a, b) => {
        if (tableSortCol === 'date') {
          const diff = new Date(a.timestamp) - new Date(b.timestamp);
          return tableSortAsc ? diff : -diff;
        } else {
          return tableSortAsc ? a.lmelead - b.lmelead : b.lmelead - a.lmelead;
        }
      });
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = rows.map(d => {
        const date = new Date(d.timestamp).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        return `<tr><td>${date}</td><td>€${fmt(d.lmelead)}</td></tr>`;
      }).join('');
    }

    function exportCSV() {
      const rows = [['Date', 'Price (EUR/tonne)']];
      filteredData.forEach(d => {
        const date = new Date(d.timestamp).toISOString().slice(0, 10);
        rows.push([date, d.lmelead.toFixed(4)]);
      });
      const csv = rows.map(r => r.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `lme-lead-${activeRange.toLowerCase()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportPNG() {
      const url = window._chart.toBase64Image('image/png', 1.0);
      const a = document.createElement('a');
      a.href = url;
      a.download = `lme-lead-chart-${activeRange.toLowerCase()}.png`;
      a.click();
    }

    async function init() {
      let payload;
      try {
        const res = await fetch('./data.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        payload = await res.json();
      } catch (err) {
        document.getElementById('error').textContent = `Failed to load data: ${err.message}`;
        return;
      }

      const { updated, data } = payload;

      if (!data || data.length === 0) {
        document.getElementById('error').textContent = 'No data available yet.';
        return;
      }

      allData = data;

      document.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', () => applyRange(btn.dataset.range));
      });

      document.querySelectorAll('thead th').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (tableSortCol === col) {
            tableSortAsc = !tableSortAsc;
          } else {
            tableSortCol = col;
            tableSortAsc = col === 'price';
          }
          renderTable();
        });
      });

      applyRange('All');

      if (updated) {
        const d = new Date(updated);
        document.getElementById('meta').textContent =
          `Last updated: ${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}`;
      }
    }

    init();
  </script>
</body>
</html>
